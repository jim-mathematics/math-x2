<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x2 Infinity Counter</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      text-align:center;
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      width:700px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      color:#38bdf8;
    }

    .number{
      font-size:45px;
      margin:20px;
      word-break:break-word;
    }

    .name{
      font-size:24px;
      color:#facc15;
      margin-bottom:20px;
    }

    button{
      padding:12px 25px;
      margin:10px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.05);
    }

    .speed{
      margin-top:15px;
      color:#94a3b8;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>x2 Infinity Counter</h1>

  <div class="number" id="num">1</div>
  <div class="name" id="name">One</div>

  <button onclick="multiply()">x2</button>
  <button onclick="toggleAuto()" id="autoBtn">Start Auto</button>

  <div class="speed">
    Speed: <span id="speed">2000</span> ms
  </div>
</div>

<script>

let value = 1;
let speed = 2000;
let interval = null;
let auto = false;

const names = [
"",
"Thousand",
"Million",
"Billion",
"Trillion",
"Quadrillion",
"Quintillion",
"Sextillion",
"Septillion",
"Octillion",
"Nonillion",
"Decillion",
"Undecillion",
"Duodecillion",
"Tredecillion",
"Quattuordecillion",
"Quindecillion",
"Sexdecillion",
"Septendecillion",
"Octodecillion",
"Novemdecillion",
"Vigintillion"
];

function scientific(num){
  return num.toExponential(2);
}

function getName(num){

  let exponent = Math.floor(Math.log10(num));
  let index = Math.floor(exponent / 3);

  if(index <= 0) return "One";

  if(index < names.length){
    return names[index];
  }

  return "Infinity+";
}

function update(){

  document.getElementById("num").innerText =
    scientific(value);

  document.getElementById("name").innerText =
    getName(value);

  document.getElementById("speed").innerText =
    speed;
}

function multiply(){

  value *= 2;

  if(!isFinite(value)){
    value = Number.MAX_VALUE;
  }

  update();
}

function startLoop(){

  interval = setInterval(() => {

    multiply();

    if(speed > 10){

      speed -= 50;

      clearInterval(interval);

      startLoop();
    }

  }, speed);
}

function toggleAuto(){

  auto = !auto;

  const btn = document.getElementById("autoBtn");

  if(auto){

    btn.innerText = "Stop Auto";

    startLoop();

  }else{

    btn.innerText = "Start Auto";

    clearInterval(interval);
  }
}

update();

</script>

</body>
</html>
